name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        id: wn-cache
        with:
          path: ~/.local/share/wn
          key: wn-oewn2025-omwit20-ruwn01

      - name: Download WordNet lexicons
        if: steps.wn-cache.outputs.cache-hit != 'true'
        run: |
          python -c "
          import wn
          wn.download('oewn:2025+')
          wn.download('omw-it:2.0')
          wn.download('ruwn:0.1')
          "

      - run: python scripts/build_synsets.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build -- --base=/synonyms/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
